# Phase 1: YOLOv8-Seg + SAHI-style tiled inference

data:
  data_dir: ./data
  output_dir: ./outputs
  tile_size: 1024
  overlap_ratio: 0.1
  input_format: png

model:
  model_name: yolov8m-seg
  model_weights: yolov8m-seg.pt
  conf_threshold: 0.4
  iou_threshold: 0.5
  sahi_slice_height: 1024
  sahi_slice_width: 1024
  sahi_overlap_height_ratio: 0.1
  sahi_overlap_width_ratio: 0.1
  mask_nms_threshold: 0.5

gpu:
  device_ids: [0, 1, 2, 3]
  device: cuda
  require_cuda: true
  allow_cpu_fallback: false
  cuda_visible_devices: ""
  use_multi_gpu: true
  batch_size: 1
  num_workers: 4
  pin_memory: true

postprocessing:
  simplification_tolerance: 1.0
  enable_right_angle_regularization: true
  right_angle_tolerance: 5.0
  min_polygon_area: 100.0
  output_formats: [geojson, json]

augmentation:
  enable_tta: false
  tta_scales: [1.0]
  horizontal_flip: false
  vertical_flip: false
  merge_iou_threshold: 0.5

training:
  enabled: false

  # Option A: provide an existing Ultralytics segmentation dataset YAML.
  dataset_yaml: ""

  # Option B: let train.py generate outputs/training/dataset.yaml from these dirs.
  # Expected label format:
  #   class_id x1 y1 x2 y2 ... with normalized polygon coordinates.
  train_images: data/images/train
  val_images: data/images/val
  train_labels: data/labels/train
  val_labels: data/labels/val
  use_train_as_val_if_missing: true
  class_names: [building]

  pretrained_weights: yolov8m-seg.pt
  project: outputs/training
  name: yolov8_building_seg
  exist_ok: true
  resume: false

  epochs: 100
  imgsz: 1024
  batch: 8
  workers: 8
  patience: 30
  device: ""  # empty: derive from gpu.device_ids, e.g. 0,1,2,3
  seed: 42
  deterministic: false
  amp: true
  cache: false
  rect: false
  val: true
  plots: true
  save_period: -1
  single_cls: true

  optimizer: auto
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  close_mosaic: 10
  dropout: 0.0

  overlap_mask: true
  mask_ratio: 4

  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0
  erasing: 0.4

visualization:
  enabled: true
  max_preview_size: 4096
  alpha: 0.45
  mask_color: [255, 0, 0]
  contour_color: [0, 255, 255]
  draw_contours: true
  save_binary_mask: false

hyperparameters:
  tile_size: 1024
  overlap_ratio: 0.1
  input_format: png
  conf_threshold: 0.4
  iou_threshold: 0.5
  sahi_slice_height: 1024
  sahi_slice_width: 1024
  sahi_overlap_height_ratio: 0.1
  sahi_overlap_width_ratio: 0.1
  mask_nms_threshold: 0.5
  device: cuda
  require_cuda: true
  allow_cpu_fallback: false
  cuda_visible_devices: ""
  num_workers: 4
  simplification_tolerance: 1.0
  min_polygon_area: 100.0
  output_formats: [geojson, json]
  enable_tta: false
  tta_scales: [1.0]
  horizontal_flip: false
  vertical_flip: false
  tta_merge_iou_threshold: 0.5
  save_mask_overlay: true
  mask_preview_max_size: 4096
  mask_overlay_alpha: 0.45
  save_binary_mask: false

log_level: INFO
save_intermediate: false
